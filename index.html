<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUI Serverless Gateway</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tweetnacl@1.0.3/nacl-fast.min.js"></script>
    <style>[v-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-4 md:p-8">
    <div id="app" v-cloak class="max-w-6xl mx-auto space-y-6">
        
        <div v-if="!isLoggedIn" class="bg-white p-8 rounded-lg shadow-md max-w-sm mx-auto mt-20 border-t-4 border-black">
            <h2 class="text-2xl font-bold mb-6 text-center">KUI 安全网关</h2>
            <input v-model="password" type="password" placeholder="ADMIN_PASSWORD" @keyup.enter="login" class="w-full border p-3 rounded mb-4 focus:ring-2 focus:ring-gray-800 outline-none transition">
            <button @click="login" class="w-full bg-black text-white p-3 rounded hover:bg-gray-800 font-bold">登 入</button>
        </div>

        <div v-else>
            <div class="bg-white p-5 rounded-lg shadow-sm flex flex-col md:flex-row justify-between items-center border-b-4 border-black mb-6">
                <h1 class="text-2xl font-black mb-4 md:mb-0">KUI <span class="text-gray-400 font-normal text-lg">Cluster</span></h1>
                <div class="flex gap-4">
                    <button @click="refreshData" class="bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded text-sm font-medium">🔄 刷新</button>
                    <button @click="logout" class="text-red-500 hover:bg-red-50 px-4 py-2 rounded text-sm">退出</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-sm border mb-6">
                <div class="flex flex-col md:flex-row gap-4 items-end">
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-gray-500 mb-1">服务器别名</label>
                        <input v-model="newVps.name" placeholder="如: 落地机-01" class="w-full border p-2.5 rounded bg-gray-50 outline-none">
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-gray-500 mb-1">公网 IP</label>
                        <input v-model="newVps.ip" placeholder="8.8.8.8" class="w-full border p-2.5 rounded bg-gray-50 outline-none">
                    </div>
                    <button @click="addVps" class="bg-black text-white px-8 py-2.5 rounded font-bold hover:bg-gray-800">接入机器</button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div v-for="vps in servers" :key="vps.ip" class="bg-white rounded-lg shadow-sm border overflow-hidden flex flex-col">
                    
                    <div class="p-5 border-b">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-bold text-xl flex items-center gap-2">
                                    {{ vps.name }}
                                    <span :class="isOnline(vps.last_report) ? 'bg-green-500' : 'bg-red-500'" class="w-2.5 h-2.5 rounded-full inline-block"></span>
                                </h3>
                                <p class="text-sm font-mono text-gray-500">{{ vps.ip }}</p>
                            </div>
                            <button @click="deleteVps(vps.ip)" class="text-gray-400 hover:text-red-500 text-sm">移除</button>
                        </div>
                        <div class="flex gap-4">
                            <div class="flex-1 bg-gray-50 p-2 rounded border">
                                <div class="text-xs text-gray-500">CPU</div>
                                <div class="font-bold">{{ vps.cpu || 0 }}%</div>
                            </div>
                            <div class="flex-1 bg-gray-50 p-2 rounded border">
                                <div class="text-xs text-gray-500">RAM</div>
                                <div class="font-bold">{{ vps.mem || 0 }}%</div>
                            </div>
                        </div>
                    </div>

                    <div class="p-5 flex-1 bg-gray-50/50">
                        <ul class="space-y-2 mb-4">
                            <li v-for="node in getNodesByIp(vps.ip)" :key="node.id" class="flex justify-between items-center text-sm bg-white p-3 border rounded">
                                <div>
                                    <span class="font-bold">{{ node.protocol }} <span class="font-mono text-gray-500 text-xs">#{{ node.port }}</span></span>
                                    <div v-if="node.protocol === 'Reality'" class="text-xs text-gray-500 mt-1 font-mono">SNI: {{ node.sni }}</div>
                                </div>
                                <button @click="deleteNode(node.id)" class="text-red-500 text-xs">删除</button>
                            </li>
                        </ul>

                        <div class="bg-white p-3 border rounded border-dashed">
                            <div class="flex gap-2 mb-2">
                                <select v-model="newNodeParams[vps.ip].protocol" class="border text-sm p-2 rounded flex-1">
                                    <option value="VLESS">VLESS (通用)</option>
                                    <option value="Reality">Reality (推荐)</option>
                                    <option value="Hysteria2">Hysteria 2</option>
                                </select>
                                <input v-model="newNodeParams[vps.ip].port" type="number" placeholder="端口" class="border text-sm p-2 rounded w-24">
                            </div>
                            
                            <div v-if="newNodeParams[vps.ip].protocol === 'Reality'" class="bg-blue-50 p-3 rounded mb-2 text-sm border border-blue-100">
                                <label class="block text-xs text-blue-800 mb-1 font-bold">伪装域名 (SNI)</label>
                                <input v-model="newNodeParams[vps.ip].sni" placeholder="例如: gateway.icloud.com" class="w-full border p-2 rounded outline-none mb-2">
                            </div>

                            <button @click="addNode(vps.ip)" class="w-full bg-gray-800 text-white text-sm py-2 rounded font-bold hover:bg-black">生成并下发配置</button>
                        </div>
                    </div>

                    <div class="bg-black p-4 cursor-pointer" @click="copyCommand(generateCmd(vps.ip))">
                        <div class="text-xs text-gray-400 mb-1 flex justify-between"><span>VPS 部署指令 (点击复制)</span></div>
                        <code class="text-green-400 font-mono text-xs">{{ generateCmd(vps.ip) }}</code>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive, onMounted } = Vue;

        // Base64URL 编码辅助函数 (用于 Sing-box X25519 格式)
        const toBase64Url = (uint8Array) => {
            let str = '';
            for (let i = 0; i < uint8Array.length; i++) {
                str += String.fromCharCode(uint8Array[i]);
            }
            return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        };

        const generateRealityKeys = () => {
            const keypair = nacl.box.keyPair();
            return {
                privateKey: toBase64Url(keypair.secretKey),
                publicKey: toBase64Url(keypair.publicKey),
                shortId: crypto.randomUUID().replace(/-/g, '').substring(0, 16)
            };
        };

        createApp({
            setup() {
                const isLoggedIn = ref(false);
                const password = ref('');
                const token = ref(localStorage.getItem('kui_token') || '');
                const servers = ref([]);
                const nodes = ref([]);
                const newVps = ref({ name: '', ip: '' });
                const newNodeParams = reactive({}); 
                const currentDomain = window.location.origin;

                const isOnline = (lastReport) => lastReport && (Date.now() - lastReport) < 10 * 60 * 1000;

                const fetchApi = async (url, options = {}) => {
                    options.headers = { ...options.headers, 'Authorization': token.value };
                    const res = await fetch(url, options);
                    if (res.status === 401) {
                        localStorage.removeItem('kui_token');
                        isLoggedIn.value = false;
                        throw new Error('Unauthorized');
                    }
                    return res;
                };

                const login = async () => {
                    const res = await fetch('/api/login', { method: 'POST', body: JSON.stringify({ password: password.value }) });
                    if (res.ok) {
                        token.value = password.value;
                        localStorage.setItem('kui_token', token.value);
                        isLoggedIn.value = true;
                        refreshData();
                    } else alert('鉴权失败');
                };

                const logout = () => { localStorage.removeItem('kui_token'); isLoggedIn.value = false; };

                const refreshData = async () => {
                    try {
                        const res = await fetchApi('/api/data');
                        const data = await res.json();
                        servers.value = data.servers || [];
                        nodes.value = data.nodes || [];
                        servers.value.forEach(s => {
                            if(!newNodeParams[s.ip]) newNodeParams[s.ip] = { protocol: 'VLESS', port: 443, sni: 'www.apple.com' };
                        });
                    } catch(e) {}
                };

                const addVps = async () => {
                    if(!newVps.value.ip) return;
                    await fetchApi('/api/vps', { method: 'POST', body: JSON.stringify(newVps.value) });
                    newVps.value = { name: '', ip: '' };
                    refreshData();
                };

                const deleteVps = async (ip) => {
                    if(confirm('删除机器将清理其下所有节点！')) {
                        await fetchApi('/api/vps?ip=' + ip, { method: 'DELETE' });
                        refreshData();
                    }
                };

                const getNodesByIp = (ip) => nodes.value.filter(n => n.vps_ip === ip);

                const addNode = async (ip) => {
                    const params = newNodeParams[ip];
                    if(!params.port) return;
                    
                    let payload = { 
                        id: Date.now().toString(), 
                        uuid: crypto.randomUUID(),
                        vps_ip: ip, 
                        protocol: params.protocol, 
                        port: params.port 
                    };

                    if (params.protocol === 'Reality') {
                        const keys = generateRealityKeys();
                        payload.sni = params.sni;
                        payload.private_key = keys.privateKey;
                        payload.public_key = keys.publicKey;
                        payload.short_id = keys.shortId;
                    }

                    await fetchApi('/api/nodes', { method: 'POST', body: JSON.stringify(payload) });
                    refreshData();
                };

                const deleteNode = async (id) => {
                    await fetchApi('/api/nodes?id=' + id, { method: 'DELETE' });
                    refreshData();
                };

                const generateCmd = (ip) => `bash <(curl -sL https://raw.githubusercontent.com/your-username/KUI/main/vps/kui.sh) --api "${currentDomain}" --ip "${ip}" --token "${token.value}"`;
                const copyCommand = (text) => navigator.clipboard.writeText(text).then(() => alert('部署指令已复制！'));

                onMounted(() => { if (token.value) { isLoggedIn.value = true; refreshData(); } });

                return { isLoggedIn, password, login, logout, servers, nodes, newVps, newNodeParams, isOnline, refreshData, addVps, deleteVps, getNodesByIp, addNode, deleteNode, generateCmd, copyCommand };
            }
        }).mount('#app');
    </script>
</body>
</html>
